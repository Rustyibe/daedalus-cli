name: Build and Release Rust Binary - Multiplatform

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true
        type: string
        default: 'v1.0.0'
      release_notes:
        description: 'Release notes'
        required: false
        type: string
        default: 'Automated release'

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: true

jobs:
  build-matrix:
    name: Build for ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - name: Linux x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_suffix: linux-x86_64
          - name: macOS x86_64
            runner: macos-latest
            target: x86_64-apple-darwin
            asset_suffix: macos-x86_64
          - name: Windows x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            asset_suffix: windows-x86_64.exe

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
        target: ${{ matrix.platform.target }}

    - name: Build release binary
      run: cargo build --release --target ${{ matrix.platform.target }} --locked

    - name: Get package name
      id: package_info
      run: |
        NAME=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].name')
        echo "name=$NAME" >> $GITHUB_OUTPUT

    - name: Upload binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.package_info.outputs.name }}-${{ matrix.platform.asset_suffix }}
        path: target/${{ matrix.platform.target }}/release/${{ steps.package_info.outputs.name }}${{ matrix.platform.extension || '' }}
        retention-days: 1

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-matrix
    if: always() && !contains(needs.*.result, 'failure')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Get package info
      id: package_info
      run: |
        NAME=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].name')
        VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
        echo "name=$NAME" >> $GITHUB_OUTPUT
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.event.inputs.version }}
        release_name: ${{ steps.package_info.outputs.name }}-${{ github.event.inputs.version }}
        body: ${{ github.event.inputs.release_notes }}
        files: artifacts/**/*
