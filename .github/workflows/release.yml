name: Build and Release Rust Binary - Multiplatform

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true
        type: string
        default: 'v1.0.0'
      release_notes:
        description: 'Release notes'
        required: false
        type: string
        default: 'Automated release'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: linux
          - os: windows-latest
            asset_name: windows
          - os: macos-latest
            asset_name: macos

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable

    - name: Get package info
      id: package_info
      shell: bash
      run: |
        NAME=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].name')
        echo "name=$NAME" >> $GITHUB_OUTPUT

    - name: Build release binary
      run: cargo build --release --locked

    - name: Determine binary path
      id: binary_path
      shell: bash
      run: |
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          echo "binary_path=target/release/${{ steps.package_info.outputs.name }}.exe" >> $GITHUB_OUTPUT
          echo "asset_name=${{ steps.package_info.outputs.name }}-${{ github.event.inputs.version }}-${{ matrix.asset_name }}.exe" >> $GITHUB_OUTPUT
        else
          echo "binary_path=target/release/${{ steps.package_info.outputs.name }}" >> $GITHUB_OUTPUT
          echo "asset_name=${{ steps.package_info.outputs.name }}-${{ github.event.inputs.version }}-${{ matrix.asset_name }}" >> $GITHUB_OUTPUT
        fi

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.package_info.outputs.name }}-${{ matrix.asset_name }}
        path: ${{ steps.binary_path.outputs.binary_path }}
        retention-days: 1

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Get package info
      id: package_info
      run: |
        NAME=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].name')
        echo "name=$NAME" >> $GITHUB_OUTPUT

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.event.inputs.version }}
        release_name: ${{ steps.package_info.outputs.name }}-${{ github.event.inputs.version }}
        body: ${{ github.event.inputs.release_notes }}
        files: artifacts/**/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
